{% extends "base.html" %}
{% set lang = session.get('lang', 'de') %}

{% block title %}GateKeeper - {{ title }}{% endblock %}

{% block content %}
<div class="info-container">
    <div class="info-card">
        <h2>{{ title }}</h2>
        <div class="info-content">
            {{ content | safe }}
        </div>
        <div class="form-actions" style="margin-top: 2rem;">
            <a href="{{ url_for('visitor.checkin') }}" class="btn btn-secondary">
                {{ "Zurück zum Einchecken" if lang == 'de' else "Back to Check In" }}
            </a>
        </div>
    </div>
</div>
{% endblock %}

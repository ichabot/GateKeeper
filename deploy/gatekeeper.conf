# Apache VirtualHost Configuration for GateKeeper
# Copy to /etc/apache2/sites-available/gatekeeper.conf
# Enable: sudo a2ensite gatekeeper && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName gatekeeper.example.com
    Redirect permanent / https://gatekeeper.example.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName gatekeeper.example.com

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/gatekeeper.crt
    SSLCertificateKeyFile /etc/ssl/private/gatekeeper.key

    WSGIDaemonProcess gatekeeper \
        python-home=/opt/gatekeeper/venv \
        python-path=/opt/gatekeeper \
        user=gatekeeper group=gatekeeper \
        threads=5 processes=2

    WSGIProcessGroup gatekeeper
    WSGIScriptAlias / /opt/gatekeeper/wsgi.py

    # Serve static files directly via Apache (faster)
    Alias /static /opt/gatekeeper/app/static
    <Directory /opt/gatekeeper/app/static>
        Require all granted
        ExpiresActive On
        ExpiresByType image/png "access plus 1 month"
        ExpiresByType text/css "access plus 1 week"
        ExpiresByType application/javascript "access plus 1 week"
    </Directory>

    <Directory /opt/gatekeeper>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    # Security Headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog ${APACHE_LOG_DIR}/gatekeeper_error.log
    CustomLog ${APACHE_LOG_DIR}/gatekeeper_access.log combined
</VirtualHost>
